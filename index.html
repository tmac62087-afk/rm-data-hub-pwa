function useLanguage() {
  const [lang, setLang] = React.useState(() => {
    try { return localStorage.getItem('fr_lang') || 'zh'; } catch(e) { return 'zh'; }
  });
  const t = React.useCallback((key) => {
    return translations[lang]?.[key] || translations.en[key] || key;
  }, [lang]);
  const setLanguage = React.useCallback((l) => {
    setLang(l);
    try { localStorage.setItem('fr_lang', l); } catch(e) {}
  }, []);
  return { lang, t, setLanguage };
}

    activity:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" {...s}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
  };
  return <span className={className}>{icons[name]||null}</span>;
}

function PlayerAvatar({name,size=40}){
  const initials=name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const colors=['#002395','#ED2939','#1A5FB4','#8B6914','#2E7D32','#C62828','#6A1B9A','#1565C0'];
  const color=colors[name.length%colors.length];
  return (
    <div className="rounded-full flex items-center justify-center font-bold text-white select-none" style={{width:size,height:size,background:color,fontSize:size*0.35}}>
      {initials}
    </div>
  );
}

function CountryFlag({code}){
  return <span className="text-base">{countryFlags[code]||'🏳️'}</span>;
}

  const getFiltered=()=>{

                  ))}

              </div>
            )}
          </div>
        )}

        {activeTab==='stats' && (
          <div className="space-y-3">

// ==================== DATA ====================
function Data({t,lang}){
  const [activeRank,setActiveRank]=useState('goals');
  const ranks={
    goals:{label:'Goals',key:'goals',icon:'target'},
    assists:{label:'Assists',key:'assists',icon:'share'},
    minutes:{label:'Minutes',key:'minutes',icon:'trendingUp'},
    matches:{label:'Appearances',key:'matches',icon:'users'},
    saves:{label:'Saves',key:'saves',icon:'shield'},
  };

  const sorted=[...allPlayers].sort((a,b)=>{
    const av=a[ranks[activeRank].key]||0;
    const bv=b[ranks[activeRank].key]||0;
    return bv-av;
  }).slice(0,10);
  const maxVal=Math.max(...sorted.map(p=>p[ranks[activeRank].key]||0));

  return (
    <div className="pb-28 fade-in">
      <div className="px-5 pt-14 pb-4">
        <h1 className="text-white text-2xl font-bold">{t('data')}</h1>
        <p className="text-rm-muted text-sm mt-0.5">{t('season')} {t('rankings')}</p>
      </div>

      <div className="px-5 mb-4">
        <div className="flex gap-2 overflow-x-auto scrollbar-hide">
          {Object.entries(ranks).map(([key,r])=> (
            <button key={key} onClick={()=>setActiveRank(key)} className={`flex-shrink-0 px-4 py-2.5 rounded-full text-sm font-medium transition-all flex items-center gap-1.5 ${activeRank===key?'bg-rm-blue text-white shadow-lg shadow-rm-blue/25':'bg-rm-card text-rm-muted'}`}>
              <Icon name={r.icon} size={14}/>{r.label}
            </button>
          ))}
        </div>
      </div>

      <div className="px-5">
        <div className="bg-rm-card rounded-2xl overflow-hidden">
          {sorted.map((player,i)=> {
            const val=player[ranks[activeRank].key]||0;
            return (
              <div key={player.id} className={`flex items-center gap-3 px-4 py-3 ${i!==sorted.length-1?'border-b border-white/5':''}`}>
                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold ${i<3?'bg-rm-gold text-black':'bg-rm-surface text-rm-muted'}`}>{i+1}</div>
                <PlayerAvatar name={player.name} size={36}/>
                <div className="flex-1 min-w-0">
                  <p className="text-white text-sm font-semibold truncate">{player.short}</p>
                  <p className="text-rm-muted text-xs">{player.pos}</p>
                </div>
                <div className="text-right mr-1">
                  <p className="text-white font-bold font-mono">{val}</p>
                  <p className="text-rm-muted text-[10px]">{ranks[activeRank].label}</p>
                </div>
                <div className="w-14">
                  <div className="stat-bar-bg"><div className="stat-bar-fill bg-rm-blue" style={{width:`${maxVal>0?(val/maxVal)*100:0}%`}}></div></div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="px-5 mt-5">
        <h2 className="text-white font-semibold mb-3">Team Overview</h2>
        <div className="grid grid-cols-2 gap-3">
          {[
            {label:t('goalsScored'),value:'112',sub:'+18% vs last season',good:true},
            {label:t('goalsConceded'),value:'34',sub:'-8% vs last season',good:true},
            {label:t('cleanSheets'),value:'18',sub:'Best in World Cup',good:true},
            {label:t('winRate'),value:'76%',sub:'33W 5D 6L',good:true},
          ].map(s=> (
            <div key={s.label} className="bg-rm-card rounded-2xl p-4">
              <p className="text-rm-muted text-xs">{s.label}</p>
              <p className="text-white text-2xl font-bold font-mono mt-1">{s.value}</p>
              <p className={`text-[10px] mt-1 ${s.good?'text-green-400':'text-red-400'}`}>{s.sub}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ==================== COMMUNITY ====================
function Community({t,lang}){
  const [prediction,setPrediction]=useState(Storage.get('prediction',null));
  const [vote,setVote]=useState(Storage.get('vote',null));
  const [likedTopics,setLikedTopics]=useState(Storage.get('likedTopics',[]));
  const [showPredModal,setShowPredModal]=useState(false);
  const [predHome,setPredHome]=useState('');
  const [predAway,setPredAway]=useState('');

  const pollOptions=[
    {label:'Trent Alexander-Arnold',votes:1245,percent:62},
    {label:'Dani Carvajal',votes:520,percent:26},
    {label:'Lucas Vazquez',votes:240,percent:12},
  ];

  const handleVote=(idx)=>{
    if(vote!==null)return;
    Storage.set('vote',idx);
    setVote(idx);
  };

  const handlePredict=()=>{
    if(predHome&&predAway){
      const p={home:parseInt(predHome),away:parseInt(predAway),date:new Date().toISOString()};
      Storage.set('prediction',p);
      setPrediction(p);
      setShowPredModal(false);
    }
  };

  const toggleLike=(id)=>{
    const next=likedTopics.includes(id)?likedTopics.filter(x=>x!==id):[...likedTopics,id];
    setLikedTopics(next);
    Storage.set('likedTopics',next);
  };

  return (
    <div className="pb-28 fade-in">
      <div className="px-5 pt-14 pb-4">
        <h1 className="text-white text-2xl font-bold">{t('community')}</h1>
        <p className="text-rm-muted text-sm mt-0.5">Join the conversation</p>
      </div>

      <div className="px-5 mb-5">
        <div className="bg-rm-card rounded-2xl p-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-white font-semibold">Next Match Prediction</h3>
            <span className="text-rm-gold text-xs font-medium">{prediction?'Submitted':'Open'}</span>
          </div>
          <div className="flex items-center justify-between mb-4">
            <div className="text-center">
              <div className="w-12 h-12 rounded-full bg-rm-blue flex items-center justify-center mx-auto mb-1"><span className="text-white font-bold text-sm">RM</span></div>
              <span className="text-white text-xs">France National Team</span>
            </div>
            <div className="text-center px-4">
              <p className="text-rm-muted text-xs">vs</p>
              {prediction?(
                <p className="text-white font-bold text-xl font-mono mt-1">{prediction.home} - {prediction.away}</p>
              ):<p className="text-white font-bold text-xl font-mono mt-1">? - ?</p>}
            </div>
            <div className="text-center">
              <div className="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center mx-auto mb-1"><span className="text-white font-bold text-sm">ATM</span></div>
              <span className="text-white text-xs">Atletico</span>
            </div>
          </div>
          {!prediction?(
            <button onClick={()=>setShowPredModal(true)} className="w-full py-3 bg-rm-blue rounded-xl text-white font-semibold text-sm hover:bg-rm-blue/90 transition-colors">Make Prediction</button>
          ):<p className="text-rm-muted text-xs text-center">You predicted <span className="text-rm-gold font-semibold">{prediction.home}-{prediction.away}</span>. Good luck!</p>}
        </div>
      </div>

      <div className="px-5 mb-5">
        <div className="bg-rm-card rounded-2xl p-4">
          <h3 className="text-white font-semibold mb-3">Fan Poll</h3>
          <p className="text-rm-muted text-sm mb-3">Who should start as right-back vs Atletico?</p>
          {pollOptions.map((opt,i)=> (
            <button key={i} onClick={()=>handleVote(i)} disabled={vote!==null} className={`w-full mb-2.5 last:mb-0 ${vote===null?'cursor-pointer':'cursor-default'}`}>
              <div className="flex justify-between text-xs mb-1"><span className={`${vote===i?'text-rm-gold font-semibold':'text-white'}`}>{opt.label}</span><span className="text-rm-muted">{vote!==null?`${opt.percent}%`:'Vote'}</span></div>
              <div className="stat-bar-bg"><div className={`stat-bar-fill transition-all duration-700 ${vote===i?'bg-rm-gold':'bg-rm-blue'}`} style={{width:vote!==null?`${opt.percent}%`:'0%'}}></div></div>
            </button>
          ))}
          <p className="text-rm-muted text-xs mt-2">2,005 votes · Ends in 2 days</p>
        </div>
      </div>

      <div className="px-5">
        <h2 className="text-white font-semibold mb-3">Hot Topics</h2>
        <div className="space-y-3">
          {topicsData.map(topic=> (
            <div key={topic.id} className="bg-rm-card rounded-2xl p-4">
              <div className="flex items-start gap-3">
                <div className="w-9 h-9 rounded-full bg-rm-blue flex items-center justify-center flex-shrink-0">
                  <span className="text-white text-sm font-bold">{topic.avatar}</span>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-white text-sm font-medium">{topic.author}</span>
                    {topic.hot&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-red-500/20 text-red-400 font-medium">HOT</span>}
                    <span className="text-rm-muted text-xs">{topic.time}</span>
                  </div>
                  <p className="text-white text-sm leading-snug">{topic.title}</p>
                  <div className="flex items-center gap-4 mt-2">
                    <span className="flex items-center gap-1 text-rm-muted text-xs"><Icon name="messageCircle" size={12}/> {topic.replies}</span>
                    <button onClick={()=>toggleLike(topic.id)} className="flex items-center gap-1 text-xs transition-colors">
                      <Icon name="heart" size={12} className={likedTopics.includes(topic.id)?'text-red-500':'text-rm-muted'}/>
                      <span className={likedTopics.includes(topic.id)?'text-red-500':'text-rm-muted'}>{topic.likes+(likedTopics.includes(topic.id)?1:0)}</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Prediction Modal */}
      {showPredModal&&(
        <div className="fixed inset-0 z-[100] flex items-end justify-center" onClick={()=>setShowPredModal(false)}>
          <div className="absolute inset-0 bg-black/70"></div>
          <div className="relative w-full max-w-[430px] bg-rm-card rounded-t-3xl p-6 slide-up" onClick={e=>e.stopPropagation()}>
            <div className="w-12 h-1 rounded-full bg-white/20 mx-auto mb-4"></div>
            <h3 className="text-white text-lg font-bold mb-4">{t('predictScore')}</h3>
            <div className="flex items-center justify-between mb-6">
              <div className="text-center flex-1">
                <p className="text-white font-semibold mb-2">France</p>
                <input type="number" min="0" max="10" value={predHome} onChange={e=>setPredHome(e.target.value)} className="w-16 h-16 bg-rm-surface rounded-2xl text-white text-3xl font-bold text-center font-mono border border-rm-border focus:border-rm-blue outline-none" placeholder="0"/>
              </div>
              <span className="text-rm-muted text-xl font-bold px-4">-</span>
              <div className="text-center flex-1">
                <p className="text-white font-semibold mb-2">Atletico</p>
                <input type="number" min="0" max="10" value={predAway} onChange={e=>setPredAway(e.target.value)} className="w-16 h-16 bg-rm-surface rounded-2xl text-white text-3xl font-bold text-center font-mono border border-rm-border focus:border-rm-blue outline-none" placeholder="0"/>
              </div>
            </div>
            <button onClick={handlePredict} className="w-full py-3.5 bg-rm-blue rounded-xl text-white font-semibold text-sm">Submit Prediction</button>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [activeTab,setActiveTab]=useState('match');
  const [selectedPlayer,setSelectedPlayer]=useState(null);
  const {lang,t,setLanguage}=useLanguage();

  const tabs=[
    {id:'match',label:t('matchCenter'),icon:'home'},
    {id:'squad',label:t('squad'),icon:'users'},
    {id:'tactics',label:t('tactics'),icon:'layout'},
    {id:'data',label:t('data'),icon:'barChart'},
    {id:'community',label:t('community'),icon:'messageCircle'},
  ];

  return (
    <div className="w-full max-w-[430px] min-h-screen bg-rm-dark relative overflow-hidden">
      {/* Install prompt for PWA */}
      <InstallPrompt t={t}/>

      {/* Status bar */}
      <div className="sticky top-0 z-50">
        <div className="h-12 flex items-center justify-between px-6 bg-rm-dark/90 backdrop-blur-xl">
          <span className="text-white text-sm font-semibold">9:41</span>
          <div className="flex items-center gap-3">
            <button onClick={()=>setLanguage(lang==='zh'?'en':'zh')} className="text-xs font-bold text-white bg-white/10 hover:bg-white/20 px-2 py-1 rounded transition-colors">
              {lang==='zh'?'EN':'中文'}
            </button>
            <div className="flex items-center gap-1.5">
              <div className="w-4 h-4 rounded-full bg-white/20"></div>
              <div className="w-4 h-4 rounded-full bg-white/20"></div>
              <div className="w-6 h-3 rounded-sm bg-white/40"></div>
            </div>
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="relative">
        {selectedPlayer?(
          <PlayerDetail t={t} lang={lang} player={selectedPlayer} onBack={()=>setSelectedPlayer(null)}/>
        ):(
          <>
            {activeTab==='match'&&<MatchCenter t={t} lang={lang}/>}
            {activeTab==='squad'&&<Squad t={t} lang={lang} onPlayerSelect={setSelectedPlayer}/>}
            {activeTab==='tactics'&&<Tactics t={t} lang={lang}/>}
            {activeTab==='data'&&<Data t={t} lang={lang}/>}
            {activeTab==='community'&&<Community t={t} lang={lang}/>}
          </>
        )}
      </div>

      {/* Bottom Nav */}
      {!selectedPlayer&&(
        <div className="fixed bottom-0 left-0 right-0 z-50 flex justify-center">
          <div className="w-full max-w-[430px]">
            <div className="glass border-t border-white/5">
              <div className="flex items-center justify-around py-2 pb-7">
                {tabs.map(tab=> (
                  <button key={tab.id} onClick={()=>setActiveTab(tab.id)} className="flex flex-col items-center gap-1 py-1 px-3 min-w-[60px]">
                    <Icon name={tab.icon} size={22} className={activeTab===tab.id?'text-rm-blue':'text-rm-muted'}/>
                    <span className={`text-[10px] font-medium ${activeTab===tab.id?'text-rm-blue':'text-rm-muted'}`}>{tab.label}</span>
                    {activeTab===tab.id&&<div className="w-1 h-1 rounded-full bg-rm-blue mt-0.5"></div>}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function InstallPrompt({t}){
  const [show,setShow]=useState(false);
  const [dismissed,setDismissed]=useState(Storage.get('installDismissed',false));

  useEffect(()=>{
    const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
    if(!isStandalone&&!dismissed){
      const t=setTimeout(()=>setShow(true),2000);
      return ()=>clearTimeout(t);
    }
  },[dismissed]);

  if(!show||dismissed)return null;

  return (
    <div className="fixed top-14 left-0 right-0 z-[60] flex justify-center px-4">
      <div className="w-full max-w-[430px] bg-rm-card rounded-2xl p-4 shadow-2xl border border-rm-border flex items-center gap-3 slide-up">
        <div className="w-10 h-10 rounded-xl bg-rm-blue flex items-center justify-center flex-shrink-0">
          <span className="text-white font-black text-sm">RM</span>
        </div>
        <div className="flex-1 min-w-0">
          <p className="text-white text-sm font-semibold">{t('addToHome')}</p>
          <p className="text-rm-muted text-xs">{t('installDesc')}</p>
        </div>
        <button onClick={()=>{setShow(false);Storage.set('installDismissed',true);setDismissed(true);}} className="text-rm-muted hover:text-white transition-colors">
          <Icon name="x" size={18}/>
        </button>
      </div>
    </div>
  );
}

// Register Service Worker
if('serviceWorker'in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
